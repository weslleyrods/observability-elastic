heartbeat.monitors:
- type: http
  schedule: '@every 5s'
  urls:
    - http://elasticsearch:9200
    - http://kibana:5601
    - http://app:8000

- type: icmp
  schedule: '@every 5s'
  hosts:
    - elasticsearch
    - kibana
    - metricbeat

processors:
- add_cloud_metadata: ~

setup.kibana:
  host: "http://kibana:5601"

output.elasticsearch:
  hosts: ["http://elasticsearch:9200"] 